<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentriX — Alerts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 flex">

  <!-- Sidebar -->
  <aside class="sidebar bg-gray-900 border-r border-gray-800 flex flex-col min-h-screen sticky top-0">
    <div class="p-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center">
          <i class="fa-solid fa-shield-halved text-emerald-400 text-sm"></i>
        </div>
        <span class="text-white font-bold text-lg">Sentri<span class="text-emerald-400">X</span></span>
      </div>
    </div>
    <nav class="p-3 flex-1 space-y-1">
      <a href="/dashboard.html" class="sidebar-link" data-page="dashboard"><span class="icon"><i class="fa-solid fa-gauge-high"></i></span> Dashboard</a>
      <a href="/alerts.html" class="sidebar-link active" data-page="alerts"><span class="icon"><i class="fa-solid fa-bell"></i></span> Alerts</a>
      <a href="/incidents.html" class="sidebar-link" data-page="incidents"><span class="icon"><i class="fa-solid fa-file-shield"></i></span> Incidents</a>
      <a href="/ai_analyst.html" class="sidebar-link" data-page="ai"><span class="icon"><i class="fa-solid fa-robot"></i></span> AI Analyst</a>
      <a href="/reports.html" class="sidebar-link" data-page="reports"><span class="icon"><i class="fa-solid fa-chart-bar"></i></span> Reports</a>
    </nav>
    <div class="p-3 border-t border-gray-800">
      <div class="flex items-center gap-3 px-2 py-2">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 font-bold text-sm user-avatar">A</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate user-name">Admin</p>
          <p class="text-xs text-gray-500 user-role">ADMIN</p>
        </div>
        <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition"><i class="fa-solid fa-right-from-bracket text-sm"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 min-h-screen overflow-auto">
    <header class="bg-gray-900/50 border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 backdrop-blur z-10">
      <div>
        <h1 class="text-white font-semibold text-lg">Alert Management</h1>
        <p class="text-gray-500 text-xs">Monitor and triage security alerts</p>
      </div>
      <button onclick="openCreateModal()" class="btn btn-primary">
        <i class="fa-solid fa-plus"></i> New Alert
      </button>
    </header>

    <div class="p-6 page-fade">
      <!-- Filters -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 mb-4 flex flex-wrap items-center gap-3">
        <div class="relative flex-1 min-w-48">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
          <input type="text" id="search-input" placeholder="Search alerts..." class="form-input pl-9"
            oninput="debounce(loadAlerts, 400)()" />
        </div>
        <select id="filter-severity" class="form-input form-select w-36" onchange="loadAlerts()">
          <option value="">All Severities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="filter-status" class="form-input form-select w-36" onchange="loadAlerts()">
          <option value="">All Statuses</option>
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="closed">Closed</option>
          <option value="false_positive">False Positive</option>
        </select>
        <button onclick="loadAlerts()" class="btn btn-secondary btn-sm">
          <i class="fa-solid fa-rotate-right"></i> Refresh
        </button>
      </div>

      <!-- Table -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <div id="table-loading" class="flex items-center justify-center py-16">
          <i class="fa-solid fa-spinner fa-spin text-emerald-400 text-2xl"></i>
        </div>
        <div id="table-container" class="hidden overflow-x-auto">
          <table class="data-table">
            <thead class="bg-gray-800/50">
              <tr>
                <th>Alert ID</th>
                <th>Title</th>
                <th>Severity</th>
                <th>Source IP</th>
                <th>Hostname</th>
                <th>Category</th>
                <th>Status</th>
                <th>Time</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="alerts-tbody"></tbody>
          </table>
          <div id="no-results" class="hidden text-center py-12 text-gray-500">
            <i class="fa-solid fa-bell-slash text-3xl mb-3 block"></i>
            No alerts found
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between mt-4">
        <p class="text-xs text-gray-500" id="pagination-info"></p>
        <div class="flex gap-1" id="pagination-btns"></div>
      </div>
    </div>
  </main>

  <!-- Alert Detail Modal -->
  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal-box w-full max-w-2xl">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-white font-semibold text-lg" id="modal-title">Alert Details</h3>
        <button onclick="closeModal('detail-modal')" class="text-gray-500 hover:text-white transition"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Create Alert Modal -->
  <div id="create-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-white font-semibold">Create Alert</h3>
        <button onclick="closeModal('create-modal')" class="text-gray-500 hover:text-white transition"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <form id="create-form" class="space-y-4">
        <div>
          <label class="block text-gray-400 text-sm mb-1">Title *</label>
          <input type="text" id="c-title" class="form-input" required placeholder="Alert title" />
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-gray-400 text-sm mb-1">Severity</label>
            <select id="c-severity" class="form-input form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-1">Category</label>
            <input type="text" id="c-category" class="form-input" placeholder="e.g. malware" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-gray-400 text-sm mb-1">Source IP</label>
            <input type="text" id="c-source-ip" class="form-input" placeholder="192.168.1.1" />
          </div>
          <div>
            <label class="block text-gray-400 text-sm mb-1">Hostname</label>
            <input type="text" id="c-hostname" class="form-input" placeholder="WORKSTATION-01" />
          </div>
        </div>
        <div>
          <label class="block text-gray-400 text-sm mb-1">Description</label>
          <textarea id="c-description" class="form-input h-20 resize-none" placeholder="Alert description..."></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn btn-primary flex-1">Create Alert</button>
          <button type="button" onclick="closeModal('create-modal')" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    let currentPage = 1;
    let debounceTimer;

    function debounce(fn, ms) {
      return (...args) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => fn(...args), ms);
      };
    }

    async function loadAlerts(page = 1) {
      currentPage = page;
      document.getElementById('table-loading').classList.remove('hidden');
      document.getElementById('table-container').classList.add('hidden');

      const params = {
        page, page_size: 20,
        search: document.getElementById('search-input').value,
        severity: document.getElementById('filter-severity').value,
        status: document.getElementById('filter-status').value
      };
      Object.keys(params).forEach(k => !params[k] && delete params[k]);

      try {
        const data = await apiGet('/api/alerts', params);
        renderTable(data.items);
        document.getElementById('pagination-info').textContent =
          `Showing ${(page-1)*20+1}-${Math.min(page*20, data.total)} of ${data.total} alerts`;
        buildPagination(document.getElementById('pagination-btns'), page, data.pages, loadAlerts);
        document.getElementById('table-loading').classList.add('hidden');
        document.getElementById('table-container').classList.remove('hidden');
        document.getElementById('no-results').classList.toggle('hidden', data.items.length > 0);
      } catch (err) {
        document.getElementById('table-loading').innerHTML = `<p class="text-red-400 py-8 text-center">${err.message}</p>`;
      }
    }

    function renderTable(alerts) {
      const tbody = document.getElementById('alerts-tbody');
      if (!alerts.length) { tbody.innerHTML = ''; return; }
      tbody.innerHTML = alerts.map(a => `
        <tr>
          <td><span class="font-mono text-xs text-gray-400">${a.alert_id}</span></td>
          <td class="max-w-xs">
            <p class="truncate text-gray-100 text-sm" title="${a.title}">${a.title}</p>
          </td>
          <td>${severityBadge(a.severity)}</td>
          <td><span class="font-mono text-xs text-gray-400">${a.source_ip || '—'}</span></td>
          <td><span class="text-xs text-gray-400">${a.hostname || '—'}</span></td>
          <td><span class="text-xs text-gray-400 capitalize">${a.category?.replace('_',' ') || '—'}</span></td>
          <td>${statusBadge(a.status)}</td>
          <td><span class="text-xs text-gray-500">${timeAgo(a.created_at)}</span></td>
          <td>
            <div class="flex items-center gap-1">
              <button onclick="showDetail(${a.id})" class="btn btn-secondary btn-sm" title="Details">
                <i class="fa-solid fa-eye"></i>
              </button>
              <button onclick="escalate(${a.id})" class="btn btn-sm bg-blue-500/10 border border-blue-500/30 text-blue-400 hover:bg-blue-500/20" title="Escalate to Incident">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
              </button>
              <button onclick="changeStatus(${a.id}, '${a.status}')" class="btn btn-secondary btn-sm" title="Update Status">
                <i class="fa-solid fa-pen"></i>
              </button>
            </div>
          </td>
        </tr>`).join('');
    }

    async function showDetail(id) {
      const a = await apiGet(`/api/alerts/${id}`);
      document.getElementById('modal-title').textContent = a.title;
      document.getElementById('modal-body').innerHTML = `
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Alert ID</p>
              <p class="text-gray-100 font-mono">${a.alert_id}</p>
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Severity</p>
              ${severityBadge(a.severity)}
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Source IP</p>
              <p class="text-gray-100 font-mono">${a.source_ip || '—'}</p>
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Hostname</p>
              <p class="text-gray-100">${a.hostname || '—'}</p>
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Rule ID / Level</p>
              <p class="text-gray-100">${a.rule_id || '—'} / ${a.rule_level ?? '—'}</p>
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Category</p>
              <p class="text-gray-100 capitalize">${a.category?.replace('_',' ') || '—'}</p>
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Status</p>
              ${statusBadge(a.status)}
            </div>
            <div class="bg-gray-800 rounded-lg p-3">
              <p class="text-gray-500 text-xs mb-1">Created</p>
              <p class="text-gray-100 text-xs">${formatDate(a.created_at)}</p>
            </div>
          </div>
          ${a.description ? `<div class="bg-gray-800 rounded-lg p-3">
            <p class="text-gray-500 text-xs mb-1">Description</p>
            <p class="text-gray-200 text-sm">${a.description}</p>
          </div>` : ''}
          <div class="flex gap-3">
            <button onclick="escalate(${a.id})" class="btn btn-primary flex-1">
              <i class="fa-solid fa-arrow-up-right-from-square"></i> Escalate to Incident
            </button>
            <button onclick="changeStatus(${a.id}, '${a.status}')" class="btn btn-secondary">
              <i class="fa-solid fa-pen"></i> Update Status
            </button>
          </div>
        </div>`;
      document.getElementById('detail-modal').classList.remove('hidden');
    }

    async function escalate(id) {
      if (!confirm('Escalate this alert to a new incident?')) return;
      try {
        const result = await apiFetch(`/api/alerts/${id}/escalate`, { method: 'POST' });
        showToast(`Incident ${result.case_number} created`, 'success');
        closeModal('detail-modal');
        loadAlerts(currentPage);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function changeStatus(id, currentStatus) {
      const statuses = ['open', 'in_progress', 'closed', 'false_positive'];
      const next = statuses[(statuses.indexOf(currentStatus) + 1) % statuses.length];
      if (!confirm(`Change status to "${next.replace('_', ' ')}"?`)) return;
      try {
        await apiPatch(`/api/alerts/${id}`, { status: next });
        showToast('Status updated', 'success');
        loadAlerts(currentPage);
        closeModal('detail-modal');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function openCreateModal() {
      document.getElementById('create-form').reset();
      document.getElementById('create-modal').classList.remove('hidden');
    }

    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }

    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await apiPost('/api/alerts', {
          title: document.getElementById('c-title').value,
          severity: document.getElementById('c-severity').value,
          category: document.getElementById('c-category').value || null,
          source_ip: document.getElementById('c-source-ip').value || null,
          hostname: document.getElementById('c-hostname').value || null,
          description: document.getElementById('c-description').value || null,
        });
        showToast('Alert created', 'success');
        closeModal('create-modal');
        loadAlerts();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) m.classList.add('hidden'); });
    });

    loadAlerts();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentriX — Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 flex">

  <!-- Sidebar -->
  <aside class="sidebar bg-gray-900 border-r border-gray-800 flex flex-col min-h-screen sticky top-0">
    <div class="p-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center">
          <i class="fa-solid fa-shield-halved text-emerald-400 text-sm"></i>
        </div>
        <span class="text-white font-bold text-lg">Sentri<span class="text-emerald-400">X</span></span>
      </div>
    </div>
    <nav class="p-3 flex-1 space-y-1">
      <a href="/dashboard.html" class="sidebar-link" data-page="dashboard"><span class="icon"><i class="fa-solid fa-gauge-high"></i></span> Dashboard</a>
      <a href="/alerts.html" class="sidebar-link" data-page="alerts"><span class="icon"><i class="fa-solid fa-bell"></i></span> Alerts</a>
      <a href="/incidents.html" class="sidebar-link" data-page="incidents"><span class="icon"><i class="fa-solid fa-file-shield"></i></span> Incidents</a>
      <a href="/ai_analyst.html" class="sidebar-link" data-page="ai"><span class="icon"><i class="fa-solid fa-robot"></i></span> AI Analyst</a>
      <a href="/reports.html" class="sidebar-link active" data-page="reports"><span class="icon"><i class="fa-solid fa-chart-bar"></i></span> Reports</a>
    </nav>
    <div class="p-3 border-t border-gray-800">
      <div class="flex items-center gap-3 px-2 py-2">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 font-bold text-sm user-avatar">A</div>
        <div class="flex-1 min-w-0"><p class="text-sm font-medium text-white truncate user-name">Admin</p><p class="text-xs text-gray-500 user-role">ADMIN</p></div>
        <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition"><i class="fa-solid fa-right-from-bracket text-sm"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 min-h-screen overflow-auto">
    <header class="bg-gray-900/50 border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 backdrop-blur z-10">
      <div>
        <h1 class="text-white font-semibold text-lg">Reports & Analytics</h1>
        <p class="text-gray-500 text-xs">Generate and export incident reports</p>
      </div>
      <button onclick="loadData()" class="btn btn-secondary btn-sm">
        <i class="fa-solid fa-rotate-right"></i> Refresh
      </button>
    </header>

    <div class="p-6 page-fade space-y-6">
      <!-- Summary Stats -->
      <div id="summary-cards" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="stat-card text-center animate-pulse">
          <div class="h-8 bg-gray-800 rounded mb-2"></div>
          <div class="h-4 bg-gray-800 rounded w-2/3 mx-auto"></div>
        </div>
        <div class="stat-card text-center animate-pulse">
          <div class="h-8 bg-gray-800 rounded mb-2"></div>
          <div class="h-4 bg-gray-800 rounded w-2/3 mx-auto"></div>
        </div>
        <div class="stat-card text-center animate-pulse">
          <div class="h-8 bg-gray-800 rounded mb-2"></div>
          <div class="h-4 bg-gray-800 rounded w-2/3 mx-auto"></div>
        </div>
        <div class="stat-card text-center animate-pulse">
          <div class="h-8 bg-gray-800 rounded mb-2"></div>
          <div class="h-4 bg-gray-800 rounded w-2/3 mx-auto"></div>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <h3 class="text-white font-medium mb-4 flex items-center gap-2">
            <i class="fa-solid fa-chart-pie text-emerald-400 text-sm"></i>
            Alert Severity Distribution
          </h3>
          <div style="height:200px"><canvas id="alertSevChart"></canvas></div>
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <h3 class="text-white font-medium mb-4 flex items-center gap-2">
            <i class="fa-solid fa-chart-bar text-emerald-400 text-sm"></i>
            Incident Status Overview
          </h3>
          <div style="height:200px"><canvas id="incStatusChart"></canvas></div>
        </div>
      </div>

      <!-- Incident Reports Table -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-white font-medium flex items-center gap-2">
            <i class="fa-solid fa-file-lines text-emerald-400 text-sm"></i>
            Incident Reports
          </h3>
          <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
            <input type="text" id="search-incidents" placeholder="Search..." class="form-input pl-8 py-1.5 text-sm w-48" oninput="filterIncidents()" />
          </div>
        </div>
        <div id="incidents-loading" class="flex items-center justify-center py-10">
          <i class="fa-solid fa-spinner fa-spin text-emerald-400 text-xl"></i>
        </div>
        <div id="incidents-table" class="hidden overflow-x-auto">
          <table class="data-table">
            <thead class="bg-gray-800/50">
              <tr>
                <th>Case #</th>
                <th>Title</th>
                <th>Severity</th>
                <th>Status</th>
                <th>Assigned</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="incidents-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Report Preview -->
      <div id="report-preview" class="hidden bg-gray-900 border border-gray-800 rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-white font-medium flex items-center gap-2">
            <i class="fa-solid fa-file-alt text-emerald-400 text-sm"></i>
            Report Preview: <span id="report-case-num" class="text-emerald-400 ml-1"></span>
          </h3>
          <div class="flex gap-2">
            <button id="export-json-btn" class="btn btn-secondary btn-sm">
              <i class="fa-solid fa-file-code"></i> Export JSON
            </button>
            <button id="export-txt-btn" class="btn btn-primary btn-sm">
              <i class="fa-solid fa-file-lines"></i> Export TXT
            </button>
            <button onclick="document.getElementById('report-preview').classList.add('hidden')" class="btn btn-secondary btn-sm">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
        <div id="report-content" class="space-y-4 text-sm"></div>
      </div>
    </div>
  </main>

  <script src="/static/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    let allIncidents = [];
    let alertSevChart, incStatusChart;

    async function loadData() {
      try {
        const [summary, incidents] = await Promise.all([
          apiGet('/api/reports/summary'),
          apiGet('/api/incidents', { page_size: 100 })
        ]);

        renderSummaryCards(summary);
        renderCharts(summary);

        allIncidents = incidents.items;
        renderIncidentsTable(allIncidents);

        // Check URL params
        const urlParams = new URLSearchParams(window.location.search);
        const incParam = urlParams.get('incident');
        if (incParam) loadReport(parseInt(incParam));
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderSummaryCards(summary) {
      document.getElementById('summary-cards').innerHTML = `
        <div class="stat-card">
          <div class="flex items-center justify-between mb-2">
            <span class="text-gray-500 text-sm">Total Alerts</span>
            <i class="fa-solid fa-bell text-orange-400 text-sm"></i>
          </div>
          <p class="text-3xl font-bold text-white">${summary.total_alerts}</p>
          <div class="mt-2 flex gap-1 flex-wrap">
            ${Object.entries(summary.alerts_by_severity || {}).map(([s, c]) => `
              <span class="badge badge-${s}">${s}: ${c}</span>`).join('')}
          </div>
        </div>
        <div class="stat-card">
          <div class="flex items-center justify-between mb-2">
            <span class="text-gray-500 text-sm">Total Incidents</span>
            <i class="fa-solid fa-file-shield text-blue-400 text-sm"></i>
          </div>
          <p class="text-3xl font-bold text-white">${summary.total_incidents}</p>
          <div class="mt-2 flex gap-1 flex-wrap">
            ${Object.entries(summary.incidents_by_status || {}).map(([s, c]) => `
              <span class="badge badge-${s}">${s.replace('_',' ')}: ${c}</span>`).join('')}
          </div>
        </div>
        <div class="stat-card">
          <div class="flex items-center justify-between mb-2">
            <span class="text-gray-500 text-sm">Total IOCs</span>
            <i class="fa-solid fa-virus text-purple-400 text-sm"></i>
          </div>
          <p class="text-3xl font-bold text-white">${summary.total_iocs}</p>
          <p class="text-xs text-gray-500 mt-1">${summary.malicious_iocs} malicious confirmed</p>
        </div>
        <div class="stat-card">
          <div class="flex items-center justify-between mb-2">
            <span class="text-gray-500 text-sm">Generated</span>
            <i class="fa-solid fa-clock text-emerald-400 text-sm"></i>
          </div>
          <p class="text-sm font-medium text-white">${new Date(summary.generated_at).toLocaleString()}</p>
          <p class="text-xs text-gray-500 mt-1">Report timestamp</p>
        </div>`;
    }

    function renderCharts(summary) {
      const colors = { critical: '#ef4444', high: '#f97316', medium: '#eab308', low: '#22c55e' };
      const statusColors = { open: '#3b82f6', in_progress: '#eab308', resolved: '#22c55e', closed: '#6b7280' };

      const sevLabels = Object.keys(summary.alerts_by_severity || {});
      const sevValues = Object.values(summary.alerts_by_severity || {});
      if (alertSevChart) alertSevChart.destroy();
      alertSevChart = new Chart(document.getElementById('alertSevChart').getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: sevLabels.map(l => l.charAt(0).toUpperCase() + l.slice(1)),
          datasets: [{ data: sevValues, backgroundColor: sevLabels.map(l => colors[l] || '#6b7280'), borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'right', labels: { color: '#9ca3af', font: { size: 12 } } } } }
      });

      const stLabels = Object.keys(summary.incidents_by_status || {});
      const stValues = Object.values(summary.incidents_by_status || {});
      if (incStatusChart) incStatusChart.destroy();
      incStatusChart = new Chart(document.getElementById('incStatusChart').getContext('2d'), {
        type: 'bar',
        data: {
          labels: stLabels.map(l => l.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase())),
          datasets: [{ data: stValues, backgroundColor: stLabels.map(l => (statusColors[l] || '#6b7280') + 'bb'), borderRadius: 6 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#6b7280' } },
            y: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280' }, beginAtZero: true }
          }
        }
      });
    }

    function renderIncidentsTable(items) {
      document.getElementById('incidents-loading').classList.add('hidden');
      document.getElementById('incidents-table').classList.remove('hidden');
      document.getElementById('incidents-tbody').innerHTML = items.map(inc => `
        <tr>
          <td><span class="font-mono text-xs text-emerald-400">${inc.case_number}</span></td>
          <td class="max-w-xs"><p class="truncate text-sm">${inc.title}</p></td>
          <td>${severityBadge(inc.severity)}</td>
          <td>${statusBadge(inc.status)}</td>
          <td><span class="text-xs text-gray-400">${inc.assigned_to || '—'}</span></td>
          <td><span class="text-xs text-gray-500">${timeAgo(inc.created_at)}</span></td>
          <td>
            <div class="flex gap-1">
              <button onclick="loadReport(${inc.id})" class="btn btn-secondary btn-sm">
                <i class="fa-solid fa-eye"></i> Preview
              </button>
              <a href="/api/reports/incident/${inc.id}/export/txt" class="btn btn-sm bg-blue-500/10 border border-blue-500/30 text-blue-400 hover:bg-blue-500/20">
                <i class="fa-solid fa-download"></i> TXT
              </a>
              <a href="/api/reports/incident/${inc.id}/export/json" class="btn btn-secondary btn-sm">
                <i class="fa-solid fa-code"></i> JSON
              </a>
            </div>
          </td>
        </tr>`).join('') || '<tr><td colspan="7" class="text-center text-gray-500 py-8">No incidents found</td></tr>';
    }

    function filterIncidents() {
      const q = document.getElementById('search-incidents').value.toLowerCase();
      const filtered = allIncidents.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.case_number.toLowerCase().includes(q) ||
        (i.assigned_to || '').toLowerCase().includes(q)
      );
      renderIncidentsTable(filtered);
    }

    async function loadReport(incidentId) {
      try {
        const report = await apiGet(`/api/reports/incident/${incidentId}`);
        const preview = document.getElementById('report-preview');
        document.getElementById('report-case-num').textContent = report.case_number;

        // Set export buttons
        document.getElementById('export-json-btn').onclick = () => window.open(`/api/reports/incident/${incidentId}/export/json`);
        document.getElementById('export-txt-btn').onclick = () => window.open(`/api/reports/incident/${incidentId}/export/txt`);

        document.getElementById('report-content').innerHTML = `
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="bg-gray-800 rounded-lg p-3"><p class="text-gray-500 text-xs mb-1">Severity</p>${severityBadge(report.severity)}</div>
            <div class="bg-gray-800 rounded-lg p-3"><p class="text-gray-500 text-xs mb-1">Status</p>${statusBadge(report.status)}</div>
            <div class="bg-gray-800 rounded-lg p-3"><p class="text-gray-500 text-xs mb-1">Priority</p>${severityBadge(report.priority)}</div>
            <div class="bg-gray-800 rounded-lg p-3"><p class="text-gray-500 text-xs mb-1">Assigned</p><p class="text-gray-200 text-sm">${report.assigned_to || '—'}</p></div>
          </div>
          <div class="bg-gray-800 rounded-lg p-4">
            <p class="text-gray-500 text-xs mb-2">Title</p>
            <p class="text-white font-medium">${report.title}</p>
          </div>
          ${report.description ? `<div class="bg-gray-800 rounded-lg p-4">
            <p class="text-gray-500 text-xs mb-2">Description</p>
            <p class="text-gray-200">${report.description}</p>
          </div>` : ''}
          ${report.ai_summary ? `<div class="bg-emerald-500/5 border border-emerald-500/20 rounded-lg p-4">
            <p class="text-emerald-400 text-xs font-semibold mb-2"><i class="fa-solid fa-robot mr-1"></i>AI Summary</p>
            <p class="text-gray-200">${report.ai_summary}</p>
          </div>` : ''}
          ${report.ai_iocs ? `<div class="bg-orange-500/5 border border-orange-500/20 rounded-lg p-4">
            <p class="text-orange-400 text-xs font-semibold mb-2"><i class="fa-solid fa-virus mr-1"></i>Identified IOCs</p>
            <pre class="text-gray-200 whitespace-pre-wrap text-xs">${report.ai_iocs}</pre>
          </div>` : ''}
          ${report.ai_recommendations ? `<div class="bg-blue-500/5 border border-blue-500/20 rounded-lg p-4">
            <p class="text-blue-400 text-xs font-semibold mb-2"><i class="fa-solid fa-list-check mr-1"></i>Recommendations</p>
            <pre class="text-gray-200 whitespace-pre-wrap text-xs">${report.ai_recommendations}</pre>
          </div>` : ''}
          ${report.alerts?.length ? `<div>
            <p class="text-gray-400 text-xs font-semibold mb-2">Related Alerts (${report.alerts.length})</p>
            <div class="space-y-1">${report.alerts.map(a => `
              <div class="flex items-center gap-2 bg-gray-800 rounded px-3 py-2">
                ${severityBadge(a.severity)}
                <span class="font-mono text-xs text-gray-500">${a.alert_id}</span>
                <span class="text-xs text-gray-300 flex-1">${a.title}</span>
                <span class="text-xs text-gray-500">${a.source_ip || ''}</span>
              </div>`).join('')}
            </div>
          </div>` : ''}
          ${report.iocs?.length ? `<div>
            <p class="text-gray-400 text-xs font-semibold mb-2">Indicators of Compromise (${report.iocs.length})</p>
            <div class="space-y-1">${report.iocs.map(i => `
              <div class="flex items-center gap-2 bg-gray-800 rounded px-3 py-2">
                <span class="badge badge-${i.is_malicious ? 'critical' : 'low'}">${i.type?.toUpperCase()}</span>
                <span class="font-mono text-xs flex-1">${i.value}</span>
                <span class="text-xs ${i.is_malicious ? 'text-red-400' : 'text-green-400'}">${i.is_malicious ? 'MALICIOUS' : 'Clean'}</span>
                ${i.vt_score ? `<span class="text-xs text-gray-500">VT: ${i.vt_score}</span>` : ''}
              </div>`).join('')}
            </div>
          </div>` : ''}
          <div class="text-xs text-gray-600 text-right">Report generated: ${formatDate(report.generated_at)}</div>`;

        preview.classList.remove('hidden');
        preview.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    loadData();
  </script>
</body>
</html>
